<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Coordinate Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          crossorigin="anonymous"/>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .coordinate-marker {
            background-color: #ff4444;
            border: 2px solid white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
        }
        .marker-label {
            background-color: white;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            crossorigin="anonymous"></script>
    
    <!-- Qt WebChannel for Python communication -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    
    <script>
        // Global variables
        var map;
        var markers = [];
        var markerCounter = 0;
        var markerIcon;
        var qtBridge = null;
        var coordinates = []; // Store coordinate data with distances
        
        // Initialize Qt WebChannel bridge
        function initQtBridge() {
            return new Promise(function(resolve, reject) {
                if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined' && qt.webChannelTransport) {
                    new QWebChannel(qt.webChannelTransport, function(channel) {
                        qtBridge = channel.objects.qtBridge;
                        console.log('Qt Bridge initialized successfully');
                        resolve();
                    });
                } else {
                    console.warn('QWebChannel not available - running without Python bridge');
                    setTimeout(function() {
                        // Try again after a delay
                        if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined' && qt.webChannelTransport) {
                            new QWebChannel(qt.webChannelTransport, function(channel) {
                                qtBridge = channel.objects.qtBridge;
                                console.log('Qt Bridge initialized successfully (delayed)');
                                resolve();
                            });
                        } else {
                            console.warn('QWebChannel still not available');
                            resolve(); // Continue anyway
                        }
                    }, 500);
                }
            });
        }
        
        // Calculate distance between two points using Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            var R = 6371000; // Earth's radius in meters
            var lat1Rad = lat1 * Math.PI / 180;
            var lat2Rad = lat2 * Math.PI / 180;
            var deltaLat = (lat2 - lat1) * Math.PI / 180;
            var deltaLon = (lon2 - lon1) * Math.PI / 180;
            
            var a = Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
                    Math.cos(lat1Rad) * Math.cos(lat2Rad) *
                    Math.sin(deltaLon / 2) * Math.sin(deltaLon / 2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            var distance = R * c;
            
            return distance;
        }
        
        // Format distance for display
        function formatDistance(distance) {
            if (distance >= 1000) {
                return (distance / 1000).toFixed(2) + ' km';
            } else {
                return distance.toFixed(2) + ' m';
            }
        }
        
        // Initialize the map when Leaflet is fully loaded
        function initializeMap() {
            try {
                console.log('Initializing map...');
                
                if (typeof L === 'undefined') {
                    console.error('Leaflet (L) is not defined! Check if the library loaded correctly.');
                    document.getElementById('map').innerHTML = '<div style="padding: 20px; text-align: center;">' +
                        '<h3>Error: Map library failed to load</h3>' +
                        '<p>Please check your internet connection and try again.</p></div>';
                    return;
                }
                
                // Initialize Qt Bridge first and wait for it
                initQtBridge().then(function() {
                    console.log('Bridge ready, now setting up map...');
                    
                    // Initialize the map (without adding a base layer yet)
                    map = L.map('map').setView([40.7128, -74.0060], 13);
            
                    // Define multiple tile layers
                    var baseLayers = {
                        "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                            maxZoom: 19
                        }),
                        
                        "CartoDB Voyager": L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                            subdomains: 'abcd',
                            maxZoom: 20
                        }),
                        
                        "CartoDB Positron (Light)": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                            subdomains: 'abcd',
                            maxZoom: 20
                        }),
                        
                        "CartoDB Dark Matter": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                            subdomains: 'abcd',
                            maxZoom: 20
                        }),
                        
                        "Esri World Imagery (Satellite)": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
                            maxZoom: 18
                        })
                    };
                    
                    // Add default layer (CartoDB Voyager - no Referer requirement)
                    baseLayers["CartoDB Voyager"].addTo(map);
                    
                    // Add layer control to allow switching between tile providers
                    L.control.layers(baseLayers, null, {
                        position: 'topright',
                        collapsed: true
                    }).addTo(map);
                    
                    // Custom icon for markers
                    markerIcon = L.divIcon({
                        className: 'coordinate-marker',
                        iconSize: [12, 12],
                        iconAnchor: [6, 6]
                    });
                    
                    // Set up map click handler
                    setupMapHandlers();
                    
                    console.log('Map initialized successfully');
                });
            } catch (error) {
                console.error('Error initializing map:', error);
                document.getElementById('map').innerHTML = '<div style="padding: 20px; text-align: center;">' +
                    '<h3>Error initializing map</h3>' +
                    '<p>' + error.message + '</p></div>';
            }
        }
        
        // Set up map event handlers
        function setupMapHandlers() {
            // Add click event to map
            map.on('click', function(e) {
                markerCounter++;
                var label = 'Point ' + markerCounter;
                
                // Calculate cumulative distance
                var cumulativeDistance = 0;
                var segmentDistance = 0;
                if (coordinates.length > 0) {
                    var prevCoord = coordinates[coordinates.length - 1];
                    segmentDistance = calculateDistance(
                        prevCoord.lat, prevCoord.lon,
                        e.latlng.lat, e.latlng.lng
                    );
                    cumulativeDistance = prevCoord.distance + segmentDistance;
                }
                
                // Store coordinate data
                var coordData = {
                    lat: e.latlng.lat,
                    lon: e.latlng.lng,
                    order: markerCounter,
                    label: label,
                    distance: cumulativeDistance
                };
                coordinates.push(coordData);
                
                var marker = L.marker([e.latlng.lat, e.latlng.lng], {
                    icon: markerIcon,
                    draggable: false
                }).addTo(map);
                
                // Build popup content with distance info
                var popupContent = '<div class="marker-label">' +
                    '<strong>' + label + '</strong><br>' +
                    'Lat: ' + e.latlng.lat.toFixed(6) + '<br>' +
                    'Lon: ' + e.latlng.lng.toFixed(6) + '<br>';
                
                if (markerCounter === 1) {
                    popupContent += 'Distance: 0.00 m';
                } else {
                    popupContent += 'Segment: ' + formatDistance(segmentDistance) + '<br>';
                    popupContent += 'Cumulative: ' + formatDistance(cumulativeDistance);
                }
                popupContent += '</div>';
                
                // Bind popup with coordinate and distance info
                marker.bindPopup(popupContent);
                
                // Store marker data
                marker._order = markerCounter;
                marker._label = label;
                marker._coordIndex = coordinates.length - 1;
                markers.push(marker);
                
                // Double-click to remove marker
                marker.on('dblclick', function() {
                    map.removeLayer(marker);
                    var index = markers.indexOf(marker);
                    if (index > -1) {
                        markers.splice(index, 1);
                    }
                    // Note: Not removing from coordinates array to maintain Python sync
                    // The Python side handles the coordinate list
                });
                
                // Send coordinate to Python
                console.log('Attempting to send coordinate to Python:', e.latlng.lat, e.latlng.lng, markerCounter, label);
                if (qtBridge && qtBridge.coordinateClicked) {
                    qtBridge.coordinateClicked(
                        e.latlng.lat, 
                        e.latlng.lng, 
                        markerCounter, 
                        label
                    );
                    console.log('Coordinate sent to Python successfully');
                } else {
                    console.warn('Qt Bridge not available - coordinate not sent to Python');
                }
            });
        }
        
        // Function to clear all markers
        function clearAllMarkers() {
            if (!map) return;
            markers.forEach(function(marker) {
                map.removeLayer(marker);
            });
            markers = [];
            coordinates = [];
            markerCounter = 0;
        }
        
        // Function to set map center and zoom
        function setMapView(lat, lon, zoom) {
            if (!map) return;
            map.setView([lat, lon], zoom);
        }
        
        // Function to add a marker programmatically
        function addMarker(lat, lon, order, label, distance) {
            if (!map) return;
            
            distance = distance || 0; // Default to 0 if not provided
            
            var marker = L.marker([lat, lon], {
                icon: markerIcon,
                draggable: false
            }).addTo(map);
            
            // Calculate segment distance if not first marker
            var segmentDistance = 0;
            if (coordinates.length > 0 && order > 1) {
                var prevCoord = coordinates[coordinates.length - 1];
                segmentDistance = calculateDistance(
                    prevCoord.lat, prevCoord.lon,
                    lat, lon
                );
            }
            
            // Build popup content with distance info
            var popupContent = '<div class="marker-label">' +
                '<strong>' + label + '</strong><br>' +
                'Lat: ' + lat.toFixed(6) + '<br>' +
                'Lon: ' + lon.toFixed(6) + '<br>';
            
            if (order === 1) {
                popupContent += 'Distance: 0.00 m';
            } else {
                if (segmentDistance > 0) {
                    popupContent += 'Segment: ' + formatDistance(segmentDistance) + '<br>';
                }
                popupContent += 'Cumulative: ' + formatDistance(distance);
            }
            popupContent += '</div>';
            
            marker.bindPopup(popupContent);
            
            marker._order = order;
            marker._label = label;
            markers.push(marker);
            
            // Store coordinate data
            coordinates.push({
                lat: lat,
                lon: lon,
                order: order,
                label: label,
                distance: distance
            });
            
            marker.on('dblclick', function() {
                map.removeLayer(marker);
                var index = markers.indexOf(marker);
                if (index > -1) {
                    markers.splice(index, 1);
                }
            });
            
            if (markerCounter < order) {
                markerCounter = order;
            }
        }
        
        // Function to get all markers data
        function getAllMarkers() {
            return coordinates.map(function(coord) {
                return {
                    lat: coord.lat,
                    lon: coord.lon,
                    order: coord.order,
                    label: coord.label,
                    distance: coord.distance
                };
            });
        }
        
        // Initialize when window is fully loaded (including external scripts)
        window.addEventListener('load', function() {
            console.log('Window loaded, initializing map...');
            initializeMap();
        });
    </script>
</body>
</html>
